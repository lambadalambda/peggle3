<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Peggle 3</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100vh;
      background: #070412;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Trebuchet MS", sans-serif;
      color: #64748b;
    }
    canvas {
      border-radius: 12px;
      box-shadow: 0 0 60px rgba(120, 90, 255, 0.35), 0 0 0 1px rgba(160, 140, 255, 0.25);
      cursor: crosshair;
    }
    p { font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <p>orange clears the level · green is multiball · purple is 500 points · the bucket gives your ball back</p>
  <script type="module" src="src/main.js"></script>

</html>
